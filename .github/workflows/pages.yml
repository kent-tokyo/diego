name: Pages

# Publishes the sample report to GitHub Pages and regenerates it from source on
# each deploy, so the live demo never drifts from the report generator.
#
# One-time setup: in the repository Settings → Pages, set "Source" to
# "GitHub Actions". (configure-pages below attempts to enable it automatically
# when token permissions allow.)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'examples/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Regenerate sample report from source
        run: |
          cargo run --release --example sample_report -- docs/sample-report.html
          cargo run --release --example sample_report -- docs/sample-findings.json
      - name: Create version-pinned copy (docs/vX.Y/)
        run: |
          VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([0-9]+)\.([0-9]+).*/v\1.\2/')
          mkdir -p "docs/$VER"
          cp docs/sample-report.html docs/sample-findings.json "docs/$VER/"
          echo "Published latest + $VER"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
